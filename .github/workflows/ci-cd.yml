# GitHub Actions CI/CD Pipeline

# YAML structure:
#   name:      display name in GitHub UI
#   on:        trigger conditions
#   jobs:      what to run
#   steps:     individual commands within a job

name: CI/CD Pipeline

# Triggers 
on:
  push:
    branches: [ main ]           # Full pipeline on main pushes
  pull_request:
    branches: [ main ]           # Tests only on PRs (no deploy)

# Environment variables
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/house-price-api
  PYTHON_VERSION: "3.11"

# Jobs
jobs:

  # Job 1: Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest        # GitHub provides this VM for free

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"             # Cache pip packages between runs -> faster CI

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false   # Coverage upload failure shouldn't block deploy

  # Job 2: Build & Push Docker Image
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                    # only runs if the test job PASSED
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python src/train.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # Read cache from GitHub Actions cache
          cache-to: type=gha,mode=max # Write cache back (max = cache all layers)

  # Job 3: Deploy to Render 
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push          # Only deploy if image was built successfully
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Notify deployment success
        run: |
          echo " Deployed to Render successfully!"
          echo " Commit: ${{ github.sha }}"
          echo " Triggered by: ${{ github.actor }}"
